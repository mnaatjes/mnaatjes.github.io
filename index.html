<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1">
    <!--w3 Fonts -->
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <!--Font Awesome Update-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <!--Google Inter Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <!--Main CSS Document-->
    <link rel="stylesheet" href="styles__construction/main.css">
    <head>
        <title>Portfolio: Construction</title>
    </head>
    <body>
        <nav>
            <div class="__nav__logo">
                Michael Naatjes
            </div>
            <div class="__nav--desktop">
                <a class="link--nav" href="" data-state="disabled">Coming Soon</a>
            </div>
            <div class="__nav--mobile">
                <button type="button">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </nav>
        <header class="--construction">
            <section class="--construction__grid">
                <img class="--construction" src="assets/20240707_122744.jpg" alt="headshot">
                <h1 class="--construction">Under Construction</h1>
                <div class="--construction__arrow">
                    <div class="arrow">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>
                <div class="--construction__screen">
                    <div class="screen__heading">
                        <div class="screen__heading__dots-container">
                            <div class="screen__heading__dot"></div>
                            <div class="screen__heading__dot"></div>
                            <div class="screen__heading__dot"></div>
                        </div>
                        <div class="screen__heading__bar"></div>
                    </div>
                    <div class="screen__heading__display">
                        <p>Hello,</p>
                        <p>
                            I&apos;m <strong>Michael Naatjes</strong>. The website isn&apos;t finished yet. 
                            Please take a look at the links to my social media and LinkedIn. 
                            Also, check out my <a href="" class="link--construction">Resume</a>&excl;
                        </p>

                    </div>
                </div>
                <article class="--construction__links">
                    <a href="#" class="btn--social-hero">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="#" class="btn--social-hero">
                        <i class="fab fa-dribbble"></i>
                    </a>
                    <a href="#" class="btn--social-hero">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="#" class="btn--social-hero">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <div class="arrow">
                        <i class="fa-solid fa-arrow-up"></i>
                    </div>
                </article>
            </section>
        </header>
    </body>
</html>
